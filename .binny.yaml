# only pull in version updates that were released more than a week ago (low-pass filter for quickly-retracted releases)
cooldown: 7d
tools:
  # the tool being built from this repo, used to manage all other tool installations
  - name: binny
    version:
      # since the module is . then "current" means whatever is checked out
      want: current
    method: go-install
    with:
      # aka: github.com/anchore/binny, without going through github / goproxy (stay local)
      module: .
      entrypoint: cmd/binny
      ldflags:
        - -X main.version={{ .Version }}
        - -X main.gitCommit={{ .Version }}
        - -X main.gitDescription={{ .Version }}
        # note: sprig functions are available: http://masterminds.github.io/sprig/
        - -X main.buildDate={{ now | date "2006-01-02T15:04:05Z07:00" }}

  # used for macOS code signing and notarization in the release workflow
  - name: quill
    version:
      want: v0.7.1
    method: github-release
    with:
      repo: anchore/quill

  # used for generating changelogs from git history
  - name: chronicle
    version:
      want: v0.8.3
    method: github-release
    with:
      repo: anchore/chronicle

  # used by goreleaser to generate SBOMs for release artifacts
  - name: syft
    version:
      want: v1.42.4
    method: github-release
    with:
      repo: anchore/syft

  # used for release automation and GitHub API interactions
  - name: gh
    version:
      want: v2.89.0
    method: github-release
    with:
      repo: cli/cli

  # used for organizing and formatting Go imports during code formatting
  - name: gosimports
    version:
      want: v0.3.8
    method: github-release
    with:
      repo: rinchsan/gosimports

  # used for rendering changelogs and markdown in the terminal
  - name: glow
    version:
      want: v2.1.2
    method: github-release
    with:
      repo: charmbracelet/glow

  # used for building snapshot and release artifacts
  - name: goreleaser
    version:
      want: v2.15.2
    method: github-release
    with:
      repo: goreleaser/goreleaser

  # used for linting Go code during static analysis
  - name: golangci-lint
    version:
      want: v2.11.4
    method: github-release
    with:
      repo: golangci/golangci-lint

  # used for checking that dependency licenses are compliant
  - name: bouncer
    version:
      want: v0.4.0
    method: github-release
    with:
      repo: wagoodman/go-bouncer

  # the task runner used to orchestrate all development and CI commands
  - name: task
    version:
      want: v3.50.0
    method: github-release
    with:
      repo: go-task/task
